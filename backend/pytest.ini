[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    -ra
markers =
    slow: 느린 테스트 (통합/벤치마크)
    integration: DB 연결 등 외부 의존 테스트
    unit: 순수 단위 테스트
filterwarnings =
    ignore::DeprecationWarning
