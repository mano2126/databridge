name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term

      - name: Syntax check (all *.py)
        working-directory: backend
        run: |
          python -m compileall app/ main.py -q

  backend-security:
    name: Backend — 취약점 스캔
    runs-on: ubuntu-latest
    continue-on-error: true   # 초기에는 정보 수집용, 차차 강제 전환
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: pip-audit
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

  frontend-build:
    name: Frontend — 빌드 검증
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: npm audit
        working-directory: frontend
        continue-on-error: true
        run: npm audit --production || true

  # v10 #21: 감사 로그 해시 체인 + PII 마스킹 전용 회귀 테스트
  security-regression:
    name: 보안 회귀 테스트 (PII + Audit Chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install deps
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: PII + Audit chain tests only
        working-directory: backend
        run: |
          pytest tests/test_pii_masker.py tests/test_audit_chain.py -v
